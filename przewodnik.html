    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przewodnik po Cyklu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/przewodnik.css">
    <link rel="stylesheet" href="css/lang-switch.css">
</head>
<body>
    <div class="lang-switch-container">
        <span class="lang-switch-label" id="lang-pl">PL</span>
        <label class="switch">
            <input type="checkbox" id="lang-switch-checkbox" onchange="toggleLanguage()">
            <span class="slider"></span>
        </label>
        <span class="lang-switch-label" id="lang-en">EN</span>
    </div>

    <div class="guide-container">
        <a href="index.html" class="back-link">
            <i data-lucide="chevron-left"></i> <span data-i18n="back_home">Wróć do strony głównej</span>
        </a>

        <div id="step-card" class="card blue fade-in">
            <div id="step-content">
                </div>
        </div>

        <div class="nav-buttons">
            <button onclick="prevStep()" class="btn-prev" id="prev-btn" data-i18n="btn_prev">Wstecz</button>
            <button onclick="nextStep()" class="btn-next" id="next-btn" data-i18n="btn_next">Następny krok</button>
        </div>
    </div>

    <script src="js/localization.js"></script>
    <script src="js/przewodnik.js"></script>
